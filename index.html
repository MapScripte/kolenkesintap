<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Көлеңкесін тап — Шытырман Оқиға</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #ff7675;
            --bg: #eef2f7;
            --success: #10ac84;
            --warning: #f1c40f;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        #app {
            width: 95%;
            max-width: 480px;
            background: white;
            border-radius: 30px;
            padding: 25px 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        h1 { color: var(--primary); font-size: 26px; margin: 0 0 15px 0; }
        h3 { color: #57606f; font-size: 16px; margin: 10px 0; }

        /* Жоғарғы ақпараттық панель */
        .game-header {
            background: #f1f2f6;
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-size: 16px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #e4e7eb;
            font-weight: bold;
        }

        .score-val { color: var(--success); }
        .level-val { color: var(--accent); }

        /* Мәзір батырмалары */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 10px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            background: #f1f2f6;
            color: #2f3542;
        }

        button:active { transform: scale(0.96); }

        button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
        }

        .start-btn {
            background: var(--success);
            color: white;
            width: 100%;
            font-size: 22px;
            padding: 16px;
            border-radius: 20px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(16, 172, 132, 0.3);
        }

        /* Ойын алаңы */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
            min-height: 280px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        .item {
            width: 70px;
            height: 70px;
            background: #fff;
            border: 3px solid #e4e7eb;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
            user-select: none;
        }

        .item.selected {
            border-color: var(--primary);
            background: #efecff;
            transform: scale(1.1);
        }

        /* Көлеңкелер */
        .shadow-item {
            width: 70px;
            height: 70px;
            background: #dfe4ea;
            border: 3px dashed #a4b0be;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            filter: brightness(0.4) opacity(0.35);
            transition: all 0.3s ease;
            user-select: none;
        }

        .shadow-item.matched {
            filter: none;
            background: #e1fdec;
            border: 3px solid var(--success);
            animation: bounce 0.4s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .hidden { display: none !important; }

        /* Жеңіс экраны */
        .win-overlay {
            padding: 10px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stars {
            font-size: 36px;
            color: var(--warning);
            margin: 10px 0;
            letter-spacing: 5px;
        }

        .score-text {
            font-size: 20px;
            font-weight: bold;
            color: #2f3542;
            margin-bottom: 20px;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .next-btn {
            background: var(--success);
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="menu">
        <h1>Көлеңкесін тап! 🧩</h1>
        
        <h3>Тақырыпты таңда:</h3>
        <div class="btn-grid">
            <button id="btn-animals" class="active" onclick="setTheme('animals')">🐾 Жануарлар</button>
            <button id="btn-fruits" onclick="setTheme('fruits')">🍎 Жемістер</button>
        </div>

        <h3>Бастапқы қиындық:</h3>
        <div class="btn-grid">
            <button id="diff-3" class="active" onclick="setInitialDiff(3)">Оңай (3 зат)</button>
            <button id="diff-4" onclick="setInitialDiff(4)">Орташа (4 зат)</button>
        </div>

        <button class="start-btn" onclick="startGame()">Ойынды бастау ▶️</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="game-header">
            <span>Деңгей: <span id="info-level" class="level-val">1</span></span>
            <span>Ұпай: <span id="info-score" class="score-val">0</span></span>
        </div>

        <div class="game-grid" id="grid-area">
            <div class="column" id="source-col"></div>
            <div class="column" id="target-col"></div>
        </div>

        <div id="win-message" class="hidden">
            <div class="win-overlay">
                <div class="stars">⭐⭐⭐</div>
                <div class="score-text" id="score-display">Тамаша! +30 ұпай қосылды!</div>
                
                <div class="action-btns">
                    <button id="next-lvl-btn" class="next-btn" onclick="goToNextLevel()">Келесі деңгей ➡️</button>
                    <button onclick="resetAndGoHome()" style="background: #a4b0be;">Бас мәзір</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Жалпы суреттер базасы (әр жолы жаңарып отырады)
    const data = {
        animals: ['🐶', '🐱', '🐭', '🐰', '🦊', '🐻', '🐼', '🦁', '🐸', '🐵', '🐷', '🐮', '🐯', '🐧', '🐨', '🐙', '🦄', '🐝', '🦕', '🐘'],
        fruits: ['🍎', '🍏', '🍐', '🍊', '🍋', '🍌', '🍉', '🍓', '🍒', '🍍', '🥝', '🍇', '🍈', '🍑', '🥭', '🥑', '🥦', '🌽', '🥕', '🍆']
    };

    let theme = 'animals';
    let currentLevel = 1;
    let totalScore = 0;
    let itemsCount = 3; // Бастапқы заттар саны
    
    let draggedEmoji = null;
    let activeElement = null;
    let matchedCount = 0;

    // Дыбыс шығару (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'tap') {
                osc.frequency.setValueAtTime(450, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'match') {
                osc.frequency.setValueAtTime(550, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'win') {
                const now = audioCtx.currentTime;
                [300, 400, 500, 600].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i * 0.08);
                    g.gain.setValueAtTime(0.15, now + i * 0.08);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.25);
                    o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.25);
                });
            }
        } catch(e) {}
    }

    function setTheme(t) {
        playSound('tap');
        theme = t;
        document.getElementById('btn-animals').classList.toggle('active', t === 'animals');
        document.getElementById('btn-fruits').classList.toggle('active', t === 'fruits');
    }

    function setInitialDiff(n) {
        playSound('tap');
        itemsCount = n;
        document.getElementById('diff-3').classList.toggle('active', n === 3);
        document.getElementById('diff-4').classList.toggle('active', n === 4);
    }

    function startGame() {
        playSound('tap');
        currentLevel = 1;
        totalScore = 0;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadLevel();
    }

    function loadLevel() {
        matchedCount = 0;
        document.getElementById('info-level').innerText = currentLevel;
        document.getElementById('info-score').innerText = totalScore;
        document.getElementById('grid-area').classList.remove('hidden');
        document.getElementById('win-message').classList.add('hidden');
        renderGame();
    }

    function renderGame() {
        const sourceCol = document.getElementById('source-col');
        const targetCol = document.getElementById('target-col');
        sourceCol.innerHTML = '';
        targetCol.innerHTML = '';

        // Деңгей өскен сайын заттар саны артады (бірақ максимум 6 затқа дейін)
        let dynamicCount = Math.min(itemsCount + Math.floor((currentLevel - 1) / 2), 6);

        // Кездейсоқ суреттерді алу
        let items = [...data[theme]].sort(() => 0.5 - Math.random()).slice(0, dynamicCount);

        // Сол жақ (Суреттер)
        let shuffledItems = [...items].sort(() => 0.5 - Math.random());
        shuffledItems.forEach(emoji => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = emoji;
            div.draggable = true;

            const selectItem = () => {
                playSound('tap');
                if (activeElement) activeElement.classList.remove('selected');
                activeElement = div;
                activeElement.classList.add('selected');
                draggedEmoji = emoji;
            };

            div.onclick = selectItem;
            div.ontouchstart = (e) => { selectItem(); e.preventDefault(); };
            div.ondragstart = () => { draggedEmoji = emoji; };

            sourceCol.appendChild(div);
        });

        // Оң жақ (Көлеңкелер)
        let shuffledShadows = [...items].sort(() => 0.5 - Math.random());
        shuffledShadows.forEach(emoji => {
            const div = document.createElement('div');
            div.className = 'shadow-item';
            div.innerText = emoji;

            const matchAction = () => {
                if (draggedEmoji === emoji && !div.classList.contains('matched')) {
                    div.classList.add('matched');
                    playSound('match');

                    if (activeElement) activeElement.style.visibility = 'hidden';

                    // Түпнұсқа элементті жасыру
                    const itemsOnLeft = document.querySelectorAll('.item');
                    itemsOnLeft.forEach(item => {
                        if(item.innerText === draggedEmoji) item.style.visibility = 'hidden';
                    });

                    draggedEmoji = null;
                    matchedCount++;
                    checkWin(dynamicCount);
                }
            };

            div.onclick = matchAction;
            div.ontouchend = (e) => { matchAction(); e.preventDefault(); };
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = matchAction;

            targetCol.appendChild(div);
        });
    }

    function checkWin(dynamicCount) {
        if (matchedCount === dynamicCount) {
            setTimeout(() => {
                playSound('win');
                let pointsEarned = dynamicCount * 10;
                totalScore += pointsEarned;

                document.getElementById('info-score').innerText = totalScore;
                document.getElementById('grid-area').classList.add('hidden');
                document.getElementById('win-message').classList.remove('hidden');

                document.getElementById('score-display').innerText = `Керемет! +${pointsEarned} ұпай қосылды! Жалпы: ${totalScore}`;
                
                if (dynamicCount === 6) {
                    document.getElementById('next-lvl-btn').innerText = "Келесі деңгей (Қиын) ➡️";
                } else {
                    document.getElementById('next-lvl-btn').innerText = "Келесі деңгей ➡️";
                }
            }, 600);
        }
    }

    function goToNextLevel() {
        playSound('tap');
        currentLevel++;
        loadLevel();
    }

    function resetAndGoHome() {
        playSound('tap');
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }
</script>

</body>
</html>
